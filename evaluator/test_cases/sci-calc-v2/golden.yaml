# Quantitative regression baseline for the sci-calc-v2 test case.
#
# Provenance: per-metric MEDIAN across 40 conforming evaluation runs
# (contract pass-rate >= 95%): 30 claude-code + 10 kiro. Using the median over
# the conforming set makes the baseline robust to the bimodal spec-divergence
# failures observed in the stability study.
#
# NOTE: artifact-count fields (source_files, test_files, total_files,
# lines_of_code, doc_files) are intentionally 0 — the per-run metrics inflated
# them by counting .venv/node_modules inside run workspaces, so they are
# excluded from regression comparison until the collector is fixed.
# To re-promote from a single run instead: reporting.baseline.promote(run, path).
